# Spring Boot 应用配置
spring:
  application:
    name: ChatBot
    version: 1.0.0
  
  # JPA/Hibernate 数据库配置
  jpa:
    # 使用 H2 数据库（开发/测试环境）
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # 数据源配置
  datasource:
    # H2 内存数据库（开发环境）
    # url: jdbc:h2:mem:chatbot
    # driver-class-name: org.h2.Driver
    # username: sa
    # password: 
    
    # MySQL 配置（生产环境，需要取消注释）
    # url: jdbc:mysql://localhost:3306/chatbot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password
    
    # PostgreSQL 配置（生产环境，需要取消注释）
    url: jdbc:postgresql://localhost:5432/springaidb
    driver-class-name: org.postgresql.Driver
    username: springai
    password: secret
  
  # H2 数据库控制台（仅开发环境）
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # AI 模型配置
  ai:
    # Ollama 本地模型配置
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:latest
    jdbc:
      chat-memory:
        initialize-schema: always  # 尝试这个路径
        table-name: spring_ai_chat_memory  # 显式指定小写表名
    # OpenAI 配置（可选）
    # openai:
    #   api-key: your-api-key
    #   chat:
    #     options:
    #       model: gpt-3.5-turbo

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
  compression:
    enabled: true
    min-response-size: 1024

# 日志配置
logging:
  level:
    root: INFO
    com.chongge.chatbot: INFO
    org.springframework.web: INFO
    org.springframework.boot.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.ai.autoconfigure: DEBUG
    org.springframework.boot.autoconfigure: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 10

# Actuator 端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
